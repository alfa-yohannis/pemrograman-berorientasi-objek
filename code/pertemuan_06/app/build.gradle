plugins {
    // Apply the application plugin to add support for building a CLI application in Java.
    id 'application'
}

repositories {
    // Use Maven Central for resolving dependencies.
    mavenCentral()
}

dependencies {
    // Use JUnit Jupiter for testing.
    testImplementation libs.junit.jupiter

    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'

    implementation libs.plantuml
}

// Apply a specific Java toolchain to ease working on different environments.
java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
}

application {
    // Define the main class for the application.
    mainClass = 'pertemuan_06.App'
}

tasks.register('fatJar', Jar) {
    group = 'build'
    description = 'Assembles an executable fat jar with all runtime dependencies.'
    archiveClassifier = 'all'

    duplicatesStrategy = DuplicatesStrategy.EXCLUDE
    // Remove signature files from bundled dependencies to avoid
    // "Invalid signature file digest for Manifest main attributes".
    exclude 'META-INF/*.SF', 'META-INF/*.DSA', 'META-INF/*.RSA'
    manifest {
        attributes('Main-Class': application.mainClass.get())
    }

    from sourceSets.main.output
    dependsOn configurations.runtimeClasspath
    from {
        configurations.runtimeClasspath.collect { file ->
            file.isDirectory() ? file : zipTree(file)
        }
    }
}

tasks.named('test') {
    // Use JUnit Platform for unit tests.
    useJUnitPlatform()
}

tasks.named('run', JavaExec) {
    workingDir = rootProject.projectDir
}
